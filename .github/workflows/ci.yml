name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend · Spring Boot + Testcontainers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        working-directory: backend
        run: mvn -B verify

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports/

  python:
    name: Python analytics · pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: python/requirements-dev.txt

      - name: Install dev dependencies
        working-directory: python
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        working-directory: python
        run: pytest

  frontend:
    name: Frontend · Vitest + Vite build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Unit tests (Vitest)
        working-directory: frontend
        run: npm test

      - name: Production build (tsc + vite)
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker · compose build
    runs-on: ubuntu-latest
    needs: [backend, python, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build all images
        run: docker compose build
