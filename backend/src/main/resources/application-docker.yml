# Configuración específica para Docker
spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/racing_team_db
    username: racing_user
    password: racing_pass
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    max-threads: 200
    min-spare-threads: 10

logging:
  level:
    com.racingteam: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /app/logs/racing-team-management.log
    max-size: 100MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# Configuración específica de la aplicación para Docker
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://frontend:3000}
  seed:
    admin-email: ${APP_SEED_ADMIN_EMAIL:admin@racing.com}
    admin-password: ${APP_SEED_ADMIN_PASSWORD:admin123}
    team-name: ${APP_SEED_TEAM_NAME:Demo Racing Team}
    demo-data: ${APP_SEED_DEMO_DATA:true}
  analytics:
    python-url: ${PYTHON_ANALYTICS_URL:http://python-analytics:8000}
    timeout-ms: ${PYTHON_ANALYTICS_TIMEOUT_MS:10000}