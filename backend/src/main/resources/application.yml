spring:
  application:
    name: lapsight

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lapsight_db}
    username: ${SPRING_DATASOURCE_USERNAME:lapsight_user}
    password: ${SPRING_DATASOURCE_PASSWORD:lapsight_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    jwt:
      # Debe ser base64 de al menos 32 bytes para HS256. Cambiar en producción vía env.
      secret: ${JWT_SECRET:Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tdXNlLWEtbG9uZy1iYXNlNjQta2V5LXBsZWFzZQ==}
      expiration: ${JWT_EXPIRATION_MS:86400000} # 24 horas

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.lapsight: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Configuración específica de la aplicación
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
  seed:
    admin-email: ${APP_SEED_ADMIN_EMAIL:}
    admin-password: ${APP_SEED_ADMIN_PASSWORD:change-me-via-env}
    team-name: ${APP_SEED_TEAM_NAME:Demo Racing Team}
    demo-data: ${APP_SEED_DEMO_DATA:false}
  analytics:
    python-url: ${PYTHON_ANALYTICS_URL:http://localhost:8000}
    timeout-ms: ${PYTHON_ANALYTICS_TIMEOUT_MS:10000}
  rate-limit:
    auth:
      max-requests: ${APP_RATE_LIMIT_AUTH_MAX:10}
      window-seconds: ${APP_RATE_LIMIT_AUTH_WINDOW_SEC:60}

---
# Perfil de desarrollo
spring:
  config:
    activate:
      on-profile: dev
  
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

---
# Perfil de testing
spring:
  config:
    activate:
      on-profile: test
  
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: create-drop